<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="泰國2026">
<meta name="theme-color" content="#0d0f14">
<title>🇹🇭 泰國 2026</title>
<style>

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0d0f14; --bg2: #141720; --bgc: #1a1e2a; --bgi: #0f1219;
    --bd: #2a2f3e; --bdl: #333a4d; --acc: #4f8ef7; --accd: rgba(79,142,247,0.15);
    --gold: #f5c842; --grn: #4caf82; --red: #e05252; --t1: #e8ecf5; --t2: #8891a8; --tm: #5a6278;
  }
  body { background: var(--bg); color: var(--t1); font-family: 'Noto Sans TC', sans-serif; }
  .app { max-width: 390px; margin: 0 auto; min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .pages { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 70px; }
  .pages::-webkit-scrollbar { display: none; }
  .page { display: none; }
  .page.active { display: block; }

  /* NAV */
  .nav { position: sticky; bottom: 0; background: var(--bg2); border-top: 1px solid var(--bd); display: flex; justify-content: space-around; padding: 10px 0 14px; z-index: 100; }
  .ni { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; flex: 1; padding: 2px 0; }
  .ni-icon { font-size: 22px; line-height: 1; }
  .ni-lbl { font-size: 10px; color: var(--tm); transition: color .2s; }
  .ni.active .ni-lbl { color: var(--acc); }
  .ni-dot { width: 4px; height: 4px; background: var(--acc); border-radius: 50%; margin-top: 1px; }

  /* HOME */
  .hdr { background: var(--bg2); border-bottom: 1px solid var(--bd); padding: 16px 20px; position: sticky; top: 0; z-index: 10; }
  .hdr-sub { font-size: 11px; font-weight: 600; color: var(--tm); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px; }
  .hdr-title { font-size: 22px; font-weight: 700; color: var(--t1); }
  .hero { background: var(--bg2); border: 1px solid var(--bd); border-radius: 16px; padding: 20px; margin: 16px; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--gold), var(--acc)); }
  .cd-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .cd-box { flex: 1; background: var(--bgi); border-radius: 10px; padding: 10px 6px; text-align: center; border: 1px solid var(--bd); }
  .cd-num { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; color: var(--acc); line-height: 1; }
  .cd-lbl { font-size: 10px; color: var(--tm); margin-top: 4px; }
  .hero-sub { font-size: 13px; color: var(--t2); }
  .quick-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 0 16px 16px; }
  .qbtn { background: var(--bgc); border: 1px solid var(--bd); border-radius: 14px; padding: 12px 6px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: all .15s; }
  .qbtn:active { background: var(--bg2); }
  .qbtn-icon { font-size: 22px; }
  .qbtn-lbl { font-size: 11px; color: var(--t2); text-align: center; }
  .sec-title { font-size: 11px; font-weight: 600; color: var(--tm); letter-spacing: .1em; text-transform: uppercase; padding: 0 16px; margin-bottom: 10px; }
  .section { margin: 0 0 16px; padding: 0 16px; }
  .wx-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 0 16px 16px; }
  .wx-card { background: var(--bgc); border: 1px solid var(--bd); border-radius: 14px; padding: 14px; }
  .wx-icon { font-size: 26px; text-align: right; margin-bottom: 6px; }
  .wx-city { font-size: 11px; color: var(--tm); margin-bottom: 4px; }
  .wx-temp { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 500; color: var(--t1); line-height: 1; }
  .wx-desc { font-size: 11px; color: var(--t2); margin-top: 4px; }
  .fx-card { background: var(--bgc); border: 1px solid var(--bd); border-radius: 14px; overflow: hidden; margin: 0 16px 16px; }
  .fx-hdr { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px 10px; }
  .fx-title { font-size: 14px; font-weight: 600; color: var(--t1); }
  .fx-inp-row { display: flex; align-items: center; gap: 10px; padding: 0 16px 12px; }
  .fx-wrap { flex: 1; background: var(--bgi); border-radius: 10px; border: 1px solid var(--bd); display: flex; align-items: center; padding: 8px 12px; gap: 6px; }
  .fx-sym { font-size: 14px; color: var(--tm); }
  .fx-inp { background: none; border: none; outline: none; color: var(--t1); font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; width: 100%; }
  .fx-div { height: 1px; background: var(--bd); margin: 0 16px; }
  .fx-results { padding: 10px 16px 14px; display: flex; flex-direction: column; gap: 8px; }
  .fx-row { display: flex; justify-content: space-between; align-items: center; }
  .fx-from { font-size: 13px; color: var(--t2); }
  .fx-to { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 500; color: var(--t1); }
  .fx-rate { font-size: 10px; color: var(--grn); }
  .link-btn { border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; margin: 0 16px 10px; }
  .link-btn.blue { background: rgba(79,142,247,.08); border: 1px solid rgba(79,142,247,.2); }
  .link-btn.red { background: rgba(224,82,82,.06); border: 1px solid rgba(224,82,82,.2); }
  .link-ic { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .link-t { font-size: 13px; font-weight: 600; }
  .link-s { font-size: 11px; color: var(--t2); margin-top: 2px; }

  /* ITINERARY */
  .it-hdr { background: var(--bg2); border-bottom: 1px solid var(--bd); padding: 16px 20px 0; position: sticky; top: 0; z-index: 10; }
  .dtabs { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--bd); }
  .dtabs::-webkit-scrollbar { display: none; }
  .dtab { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 8px 14px 12px; cursor: pointer; border-bottom: 2px solid transparent; min-width: 60px; border-radius: 8px 8px 0 0; }
  .dtab.active { color: var(--acc); border-bottom-color: var(--acc); background: var(--accd); }
  .dtab-d { font-size: 16px; font-weight: 700; color: var(--tm); }
  .dtab.active .dtab-d { color: var(--acc); }
  .dtab-w { font-size: 11px; color: var(--tm); margin-top: 1px; }
  .it-main { padding: 16px 16px 100px; }
  .meet-banner { background: var(--bg2); border: 1px solid var(--bdl); border-radius: 14px; padding: 20px; margin-bottom: 20px; position: relative; overflow: hidden; }
  .meet-banner::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--gold), var(--acc)); }
  .meet-lbl { font-size: 11px; font-weight: 600; color: var(--gold); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .meet-time { font-family: 'DM Mono', monospace; font-size: 56px; font-weight: 500; color: var(--gold); line-height: 1; margin-bottom: 8px; text-shadow: 0 0 40px rgba(245,200,66,.25); }
  .meet-place { font-size: 14px; color: var(--t2); }
  .it-sec-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .it-sec-lbl { font-size: 11px; font-weight: 600; color: var(--tm); letter-spacing: .1em; text-transform: uppercase; }
  .add-btn { background: var(--acc); color: #fff; border: none; border-radius: 8px; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 16px; cursor: pointer; }
  .it-list { display: flex; flex-direction: column; gap: 10px; }
  .it-card { background: var(--bgc); border: 1px solid var(--bd); border-radius: 14px; display: flex; align-items: stretch; overflow: hidden; min-height: 90px; }
  .it-handle { width: 32px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--tm); background: rgba(255,255,255,.02); border-right: 1px solid var(--bd); font-size: 14px; }
  .it-time-col { width: 60px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--bd); }
  .it-time { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--acc); text-align: center; }
  .it-body { flex: 1; padding: 12px; display: flex; flex-direction: column; justify-content: center; gap: 4px; min-width: 0; }
  .it-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-bottom: 4px; }
  .it-title { font-size: 14px; font-weight: 600; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .it-note { font-size: 12px; color: var(--t2); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.5; }
  .it-actions { display: flex; flex-direction: column; gap: 4px; padding: 8px; justify-content: center; flex-shrink: 0; }
  .it-btn { width: 28px; height: 28px; border: 1px solid var(--bd); border-radius: 8px; background: rgba(255,255,255,.03); color: var(--t2); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .it-btn.del:hover { border-color: var(--red); color: var(--red); }
  .it-btn.edit:hover { border-color: var(--acc); color: var(--acc); }

  /* ACCOUNTING */
  .acc-hdr { background: var(--bg2); border-bottom: 1px solid var(--bd); padding: 16px 20px; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: flex-end; }
  .new-btn { background: var(--grn); color: #0d0f14; border: none; border-radius: 8px; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; font-weight: 700; padding: 8px 16px; cursor: pointer; }
  .sub-tabs { display: flex; margin: 12px 16px; background: var(--bgc); border-radius: 10px; padding: 3px; gap: 3px; border: 1px solid var(--bd); }
  .stab { flex: 1; text-align: center; padding: 7px; border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--tm); cursor: pointer; transition: all .2s; }
  .stab.active { background: var(--bg2); color: var(--t1); }
  .sum-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 0 16px 16px; }
  .sum-c { background: var(--bgc); border-radius: 10px; padding: 12px; border: 1px solid var(--bd); text-align: center; }
  .sum-l { font-size: 10px; color: var(--tm); margin-bottom: 5px; }
  .sum-v { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; color: var(--t1); }
  .sum-s { font-size: 10px; color: var(--tm); margin-top: 2px; }
  .exp-list { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .exp-c { background: var(--bgc); border-radius: 14px; padding: 14px; border: 1px solid var(--bd); }
  .exp-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .exp-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-bottom: 6px; display: inline-block; }
  .exp-ttl { font-size: 15px; font-weight: 600; color: var(--t1); }
  .exp-nt { font-size: 12px; color: var(--t2); margin-top: 3px; }
  .exp-amt { font-family: 'DM Mono', monospace; font-size: 19px; font-weight: 500; color: var(--grn); white-space: nowrap; }
  .exp-twd { font-size: 11px; color: var(--acc); margin-top: 2px; text-align: right; }
  .exp-bot { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--bd); }
  .exp-pay { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--t2); }
  .av { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .exp-sp { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: var(--bgi); color: var(--t2); border: 1px solid var(--bd); }
  .exp-acts { display: flex; gap: 6px; margin-top: 8px; }
  .exp-ab { flex: 1; padding: 7px; border-radius: 8px; border: 1px solid var(--bd); background: var(--bgi); font-size: 12px; color: var(--t2); text-align: center; cursor: pointer; }
  .exp-ab.v { color: var(--grn); border-color: rgba(76,175,130,.3); }
  .exp-ab.vd { color: var(--tm); }
  .sec-hdr { display: flex; justify-content: space-between; align-items: center; padding: 0 18px 8px; }
  .sec-lbl { font-size: 11px; font-weight: 600; color: var(--tm); letter-spacing: .08em; text-transform: uppercase; }

  /* CHECKLIST */
  .cl-hdr { background: var(--bg2); border-bottom: 1px solid var(--bd); padding: 16px 20px; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: flex-end; }
  .reset-btn { font-size: 12px; color: var(--t2); background: var(--bgc); padding: 5px 10px; border-radius: 8px; border: 1px solid var(--bd); cursor: pointer; }
  .fam-tabs { display: flex; gap: 10px; overflow-x: auto; padding: 12px 16px; scrollbar-width: none; }
  .fam-tabs::-webkit-scrollbar { display: none; }
  .ftab { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex-shrink: 0; }
  .ftab-av { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; border: 2px solid transparent; transition: all .2s; }
  .ftab-av.sel { border-color: var(--gold) !important; }
  .ftab-n { font-size: 10px; color: var(--t2); }
  .ftab-n.sel { color: var(--gold); }
  .cl-prog { margin: 0 16px 14px; background: var(--bgc); border-radius: 14px; padding: 14px 16px; border: 1px solid var(--bd); }
  .cl-pt { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .cl-pn { font-size: 15px; font-weight: 700; color: var(--t1); }
  .cl-pc { font-size: 13px; color: var(--t2); }
  .cl-track { height: 8px; background: var(--bgi); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
  .cl-fill { height: 8px; border-radius: 4px; background: var(--grn); transition: width .3s; }
  .cl-pct { font-size: 12px; color: var(--grn); text-align: right; }
  .cat-sec { margin: 0 16px 10px; }
  .cat-hdr { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--bgc); border-radius: 12px 12px 0 0; border: 1px solid var(--bd); border-bottom: none; cursor: pointer; }
  .cat-hdr.coll { border-radius: 12px; }
  .cat-hl { display: flex; align-items: center; gap: 8px; }
  .cat-nm { font-size: 14px; font-weight: 600; color: var(--t1); }
  .cat-bdg { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: var(--bgi); color: var(--tm); border: 1px solid var(--bd); }
  .cat-bdg.done { color: var(--grn); border-color: rgba(76,175,130,.3); }
  .cat-chev { font-size: 12px; color: var(--tm); transition: transform .2s; }
  .cat-chev.open { transform: rotate(180deg); }
  .cat-body { background: var(--bgc); border-radius: 0 0 12px 12px; border: 1px solid var(--bd); border-top: 1px solid var(--bd); overflow: hidden; }
  .cl-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--bd); }
  .cl-item:last-child { border-bottom: none; }
  .cl-chk { width: 22px; height: 22px; border-radius: 7px; border: 1.5px solid var(--bd); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .cl-chk.on { background: var(--grn); border-color: var(--grn); }
  .cl-txt { flex: 1; font-size: 14px; color: var(--t1); }
  .cl-txt.done { color: var(--tm); text-decoration: line-through; }
  .cl-add-row { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--bd); }
  .cl-inp { flex: 1; background: var(--bgi); border: 1px solid var(--bd); border-radius: 8px; padding: 7px 10px; font-size: 13px; color: var(--t1); outline: none; font-family: inherit; }
  .cl-add-btn { font-size: 12px; background: var(--grn); color: #0d0f14; border: none; border-radius: 8px; padding: 7px 12px; cursor: pointer; font-weight: 700; }

  /* INFO */
  .emer-card { margin: 0 16px 12px; border-radius: 14px; overflow: hidden; border: 1px solid rgba(224,82,82,.3); }
  .emer-hdr { background: rgba(224,82,82,.08); padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
  .emer-ht { font-size: 14px; font-weight: 700; color: var(--red); }
  .emer-it { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: rgba(224,82,82,.04); border-top: 1px solid rgba(224,82,82,.15); cursor: pointer; }
  .emer-il { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; color: var(--t1); }
  .emer-num { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--red); }
  .call-bdg { font-size: 10px; background: rgba(224,82,82,.15); color: var(--red); padding: 3px 8px; border-radius: 20px; border: 1px solid rgba(224,82,82,.3); }
  .fl-card { margin: 0 16px 10px; background: var(--bgc); border-radius: 14px; padding: 16px; border: 1px solid var(--bd); }
  .fl-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .fl-dir { font-size: 11px; color: var(--tm); letter-spacing: .05em; text-transform: uppercase; }
  .fl-num { font-size: 12px; background: rgba(79,142,247,.15); color: var(--acc); padding: 3px 9px; border-radius: 20px; }
  .fl-route { display: flex; align-items: center; margin-bottom: 10px; }
  .fl-city { flex: 1; }
  .fl-city.r { text-align: right; }
  .fl-code { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; color: var(--t1); }
  .fl-cname { font-size: 11px; color: var(--tm); margin-top: 2px; }
  .fl-mid { display: flex; flex-direction: column; align-items: center; flex: 1.2; }
  .fl-line { display: flex; align-items: center; gap: 4px; width: 100%; }
  .fl-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--acc); flex-shrink: 0; }
  .fl-dash { flex: 1; height: 1px; background: var(--bd); }
  .fl-dur { font-size: 10px; color: var(--tm); margin-top: 3px; }
  .fl-times { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .fl-t { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--t1); }

  .tz-card { margin: 0 16px 12px; background: var(--bgc); border-radius: 14px; padding: 16px; border: 1px solid var(--bd); }
  .tz-row { display: flex; justify-content: space-between; align-items: center; }
  .tz-bl { text-align: center; flex: 1; }
  .tz-co { font-size: 11px; color: var(--tm); margin-bottom: 4px; }
  .tz-t { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; color: var(--t1); }
  .tz-z { font-size: 11px; color: var(--tm); margin-top: 2px; }
  .tz-diff { font-size: 11px; color: var(--grn); background: rgba(76,175,130,.1); padding: 3px 8px; border-radius: 20px; }
  .info-card { margin: 0 16px 10px; background: var(--bgc); border-radius: 14px; border: 1px solid var(--bd); overflow: hidden; }
  .info-ch { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .info-ct { display: flex; align-items: center; gap: 10px; }
  .info-ci { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .info-ctxt { font-size: 14px; font-weight: 600; color: var(--t1); }
  .info-cs { font-size: 11px; color: var(--tm); margin-top: 2px; }
  .info-body { padding: 0 16px 14px; border-top: 1px solid var(--bd); }
  .info-row { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--bd); }
  .info-row:last-child { border-bottom: none; }
  .info-ri { font-size: 15px; flex-shrink: 0; }
  .info-rtt { font-size: 13px; font-weight: 600; color: var(--t1); }
  .info-rd { font-size: 12px; color: var(--t2); margin-top: 3px; line-height: 1.5; }

// ── Countdown ──
function useCountdown() {
  const target = new Date('2026-05-16T06:30:00+08:00');
  const [diff, setDiff] = useState(target - new Date());
  useEffect(() => {
    const t = setInterval(() => setDiff(target - new Date()), 1000);
    return () => clearInterval(t);
  }, []);
  const pad = n => String(Math.max(0, n)).padStart(2, '0');
  return {
    d: Math.max(0, Math.floor(diff / 86400000)),
    h: pad(Math.floor((diff % 86400000) / 3600000)),
    m: pad(Math.floor((diff % 3600000) / 60000)),
    s: pad(Math.floor((diff % 60000) / 1000)),
  };
}

};
const MEM_COLORS = {
  球:{color:'#4caf82',bg:'rgba(76,175,130,.2)'},哭A:{color:'#4caf82',bg:'rgba(76,175,130,.2)'},
  COODY:{color:'#4caf82',bg:'rgba(76,175,130,.2)'},小葵:{color:'#4caf82',bg:'rgba(76,175,130,.2)'},
  EVA:{color:'#4f8ef7',bg:'rgba(79,142,247,.2)'},龍哥:{color:'#4f8ef7',bg:'rgba(79,142,247,.2)'},
  樂樂:{color:'#4f8ef7',bg:'rgba(79,142,247,.2)'},菲菲:{color:'#4f8ef7',bg:'rgba(79,142,247,.2)'},
  泰辰:{color:'#f5c842',bg:'rgba(245,200,66,.2)'},NiNi:{color:'#f5c842',bg:'rgba(245,200,66,.2)'},
  阿逼:{color:'#ffa657',bg:'rgba(255,166,87,.2)'},逼弟:{color:'#c49ef5',bg:'rgba(196,158,245,.2)'},
  國民堂哥:{color:'#56d4d4',bg:'rgba(86,212,212,.2)'},
};
const ALL_PAYERS   = ['球','哭A','EVA','龍哥','泰辰','阿逼','逼弟','國民堂哥'];
const ALL_ADULTS   = ['球','哭A','EVA','龍哥','泰辰','阿逼','逼弟','國民堂哥'];
const ALL_KIDS     = ['COODY','小葵','樂樂','菲菲','NiNi'];
const ALL_MEMBERS  = [...ALL_ADULTS,...ALL_KIDS];
const THB_RATE = 0.895;

function toTHB(a,c){return c==='THB'?a:Math.round(a/THB_RATE);}
function splitLabel(s){
  if(Array.isArray(s)) return s.length<=3?s.join('、'):s.slice(0,3).join('、')+'…等'+s.length+'人';
  return {all13:'全部13人',adults:'大人8人'}[s]||s;
}
function perHead(a,c,s){
  const n=s==='all13'?13:s==='adults'?8:Array.isArray(s)?s.length:1;
  return Math.round(toTHB(a,c)/n);
}
function getMembersOf(s){
  if(s==='all13') return ALL_MEMBERS;
  if(s==='adults') return ALL_ADULTS;
  if(Array.isArray(s)) return s;
  return [s];
}
function calcSettlements(expenses){
  const bal={};ALL_MEMBERS.forEach(m=>bal[m]=0);
  expenses.filter(e=>!e.verified).forEach(e=>{
    const pp=perHead(e.amount,e.currency,e.split);
    getMembersOf(e.split).forEach(m=>{bal[m]=(bal[m]||0)-pp;});
    bal[e.payer]=(bal[e.payer]||0)+toTHB(e.amount,e.currency);
  });
  const sets=[];
  const deb=Object.entries(bal).filter(([,v])=>v<-5).sort((a,b)=>a[1]-b[1]);
  const cre=Object.entries(bal).filter(([,v])=>v>5).sort((a,b)=>b[1]-a[1]);
  let di=0,ci=0;
  while(di<deb.length&&ci<cre.length){
    const[dn,dv]=deb[di],[cn,cv]=cre[ci];
    const amt=Math.min(-dv,cv);
    if(amt>5) sets.push({from:dn,to:cn,amount:Math.round(amt)});
    deb[di][1]+=amt;cre[ci][1]-=amt;
    if(Math.abs(deb[di][1])<5)di++;if(Math.abs(cre[ci][1])<5)ci++;
  }
  return sets;
}

// ── Checklist Page ──
function ChecklistPage() {
  const [famIdx, setFamIdx] = useState(0);
  const [checked, setChecked] = useState({});
  const [collapsed, setCollapsed] = useState({});
  const fam = FAMS[famIdx];
  const allItems = CHECKLIST_CATS.flatMap(c=>c.items);
  const doneCount = allItems.filter((_,i)=>checked[`${famIdx}-${i}`]).length;
  const pct = allItems.length>0?Math.round(doneCount/allItems.length*100):0;
  let globalIdx = 0;
  return (
    <div>
      <div className="cl-hdr">
        <div><div className="hdr-sub">打包清單</div><div className="hdr-title">行前準備</div></div>
        <button className="reset-btn">全部重置</button>
      </div>
      <div className="fam-tabs">
        {FAMS.map((f,i)=>(
          <div key={f.id} className="ftab" onClick={()=>setFamIdx(i)}>
            <div className={`ftab-av${i===famIdx?' sel':''}`} style={{background:f.bg,color:f.color}}>{f.av}</div>
            <span className={`ftab-n${i===famIdx?' sel':''}`}>{f.name}</span>
          </div>
        ))}
      </div>
      <div className="cl-prog">
        <div className="cl-pt"><span className="cl-pn">{fam.name}</span><span className="cl-pc">{doneCount} / {allItems.length}</span></div>
        <div className="cl-track"><div className="cl-fill" style={{width:pct+'%',background:pct===100?'var(--gold)':'var(--grn)'}}/></div>
        <div className="cl-pct" style={{color:pct===100?'var(--gold)':'var(--grn)'}}>{pct}% 完成</div>
      </div>
      {CHECKLIST_CATS.map(cat=>{
        const catDone = cat.items.filter((_,j)=>checked[`${famIdx}-${globalIdx+j}`]).length;
        const startIdx = globalIdx;
        globalIdx += cat.items.length;
        const coll = collapsed[`${famIdx}-${cat.id}`];
        return (
          <div key={cat.id} className="cat-sec">
            <div className={`cat-hdr${coll?' coll':''}`} onClick={()=>setCollapsed(c=>({...c,[`${famIdx}-${cat.id}`]:!c[`${famIdx}-${cat.id}`]}))}>
              <div className="cat-hl">
                <span style={{fontSize:16}}>{cat.ic}</span>
                <span className="cat-nm">{cat.n}</span>
                <span className={`cat-bdg${catDone===cat.items.length&&cat.items.length>0?' done':''}`}>{catDone}/{cat.items.length}</span>
              </div>
              <span className={`cat-chev${coll?'':' open'}`}>▼</span>
            </div>
            {!coll && (
              <div className="cat-body">
                {cat.items.map((item,j)=>{
                  const key = `${famIdx}-${startIdx+j}`;
                  return (
                    <div key={j} className="cl-item">
                      <div className={`cl-chk${checked[key]?' on':''}`} onClick={()=>setChecked(c=>({...c,[key]:!c[key]}))}>
                        {checked[key] && <span style={{fontSize:13,color:'#0d0f14',fontWeight:700}}>✓</span>}
                      </div>
                      <span className={`cl-txt${checked[key]?' done':''}`}>{item}</span>
                    </div>
                  );
                })}
                <div className="cl-add-row">
                  <input className="cl-inp" placeholder="新增項目..."/>
                  <button className="cl-add-btn">新增</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}
